app-id: com.bolwarratechnologies.this_note
runtime: org.freedesktop.Platform
runtime-version: '25.08'
sdk: org.freedesktop.Sdk
command: this_note

finish-args:
  - --share=ipc
  - --socket=wayland
  - --socket=fallback-x11
  - --device=dri

modules:
  - name: this_note_linux
    buildsystem: simple
    build-commands:
      - install -Dm755 this_note /app/lib/this_note/this_note
      - cp -ra lib /app/lib/this_note/lib
      - install -d /app/share/this_note
      - cp -ra data/. /app/share/this_note/
      - ln -s /app/share/this_note /app/lib/this_note/data
      - install -Dm755 this_note_wrapper.sh /app/bin/this_note
      - install -Dm644 com.bolwarratechnologies.this_note.desktop
          /app/share/applications/com.bolwarratechnologies.this_note.desktop
      - install -Dm644 com.bolwarratechnologies.this_note.png
          /app/share/icons/hicolor/512x512/apps/com.bolwarratechnologies.this_note.png
      - install -Dm644 com.bolwarratechnologies.this_note.metainfo.xml
          /app/share/metainfo/com.bolwarratechnologies.this_note.metainfo.xml
    sources:
      - type: archive
        url: https://github.com/Perszus/this-note-linux/releases/download/v1.0.7/this_note_linux_v1.0.7.tar.xz
        sha256: dbd468de70c53a7a6a2741fba8379da2a3dee819881387038b0f2cbd07561ac0
      - type: script
        dest-filename: this_note_wrapper.sh
        commands:
          - exec /app/lib/this_note/this_note "$@"
